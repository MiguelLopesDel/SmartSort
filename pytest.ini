[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers --cov=src/smartsort --cov-report=term-missing --cov-report=xml
norecursedirs = venv .git .tmp models data
markers =
    unit: Testes unitários rápidos
    integration: Testes de integração (módulos combinados)
    e2e: Testes end-to-end (CLI, TUI, File System)
    smoke: Testes rápidos de sanidade do sistema
    slow: Testes demorados (ex: download de modelos)
