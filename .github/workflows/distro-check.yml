name: Distro Compatibility Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-distros:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        distro: ["fedora:latest", "archlinux:latest", "debian:stable-slim"]

    steps:
      - uses: actions/checkout@v4

      - name: Real Dependency Install Test on ${{ matrix.distro }}
        run: |
          docker run --rm -v $(pwd):/app -w /app --user root ${{ matrix.distro }} sh -c "
            # Setup basico para rodar o instalador
            if command -v dnf; then dnf install -y sudo git pciutils; fi
            if command -v pacman; then pacman -Sy --noconfirm sudo git pciutils; fi
            if command -v apt-get; then apt-get update && apt-get install -y sudo git pciutils; fi

            # Testa se o script consegue instalar as dependencias de sistema REAIS
            ./scripts/install.sh --skip-update | grep -E 'Distribuição detectada|Verificando dependências'

            # Valida se o tesseract foi instalado com sucesso pela distro
            tesseract --version | grep 'tesseract'
          "
