name: CI - SmartSort

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install security tools
        run: pip install bandit safety
      - name: Security Scan (Bandit)
        run: bandit -r src/ -ll
      - name: Dependency Check (Safety)
        run: safety check

  validate:
    runs-on: ubuntu-latest
    needs: security
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Cache HuggingFace Models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-huggingface-${{ hashFiles('requirements-ci.txt') }}

      - name: Install system dependencies (OCR)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-por libtesseract-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Check Formatting (Black & Isort)
        run: |
          black --check src/ tests/
          isort --check-only src/ tests/

      - name: Static Type Checking (Mypy)
        run: mypy src/

      - name: Validate Bash scripts syntax
        run: find . -name "*.sh" -exec bash -n {} +

      - name: Code Style Check (Flake8)
        run: flake8 src/ tests/ --max-line-length=120 --extend-ignore=E203 --count --statistics

      - name: Run tests with Coverage
        env:
          PYTHONPATH: src
        run: pytest

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          name: python-${{ matrix.python-version }}
          fail_ci_if_error: false

  docker:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t smartsort:test .

      - name: Functional Docker Test
        run: |
          docker run --rm smartsort:test python3 -m smartsort --help | grep "SmartSort"
