name: CI - SmartSort

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install system dependencies (OCR)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-por libtesseract-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Check Formatting (Black & Isort)
        run: |
          black --check src/ tests/
          isort --check-only src/ tests/

      - name: Static Type Checking (Mypy)
        run: mypy src/ --ignore-missing-imports

      - name: Security Scan (Bandit & Safety)
        run: |
          bandit -r src/ -ll
          safety check

      - name: Validate Bash scripts syntax
        run: find . -name "*.sh" -exec bash -n {} +

      - name: Code Style Check (Flake8)
        run: flake8 src/ tests/ --max-line-length=120 --extend-ignore=E203 --count --statistics

      - name: Run tests with Coverage
        env:
          PYTHONPATH: src
        run: pytest

      - name: Upload Coverage Results
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml

  docker:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t smartsort:test .

      - name: Functional Docker Test
        run: |
          docker run --rm smartsort:test python3 -m smartsort --help | grep "SmartSort"
