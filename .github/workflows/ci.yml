name: CI - SmartSort

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install system dependencies (OCR)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-por libtesseract-dev
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-mock -r requirements.txt
          
      - name: Validate Bash scripts syntax
        run: |
          for file in $(find . -name "*.sh"); do
            echo "Checking syntax for $file..."
            bash -n "$file"
          done
          
      - name: Basic lint check (errors only)
        run: flake8 src/ tests/ --max-line-length=120 --extend-ignore=E203 --count --select=E9,F63,F7,F82 --show-source --statistics
        
      - name: Run tests
        env:
          PYTHONPATH: src
        run: pytest -v

  docker:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t smartsort:latest .
