name: CI - SmartSort

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install system dependencies (OCR)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-por libtesseract-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Validate Bash scripts syntax
        run: |
          find . -name "*.sh" -exec bash -n {} +

      - name: Code Style Check (Flake8)
        run: |
          flake8 src/ tests/ --max-line-length=120 --extend-ignore=E203 --count --statistics

      - name: Run tests
        env:
          PYTHONPATH: src
        run: |
          pytest -v --junitxml=test-results-${{ matrix.python-version }}.xml

      - name: Upload Test Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: test-results-${{ matrix.python-version }}.xml

  docker:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image (Sanity Check)
        run: docker build -t smartsort:latest .
