directories_to_watch:
- data/downloads_test
destination_base_folder: data/sorted
show_recommendations: true
ai_classification:
  enabled: true
  mode: zero_shot
  zero_shot_model: mDeBERTa-v3
  categorias_disponiveis:
  - Financas
  - Trabalho
  - Pessoal
  - Saude
  - Educacao
  - Projetos
acceleration:
  enabled: true
  device: gpu
  quantization: int8
  provider: auto
power_saving:
  enabled: true
  pause_ai_on_battery: true
  throttle_interval_sec: 10
  stop_below_percent: 20
fallback_rules:
  pdf: Documentos
  jpg: Imagens
  png: Imagens
  docx: Documentos
  txt: Textos
